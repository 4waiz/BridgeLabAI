<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg-ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="board-ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
    <pattern id="dots-ag" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="rgba(148,163,184,0.18)"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg-ag)"/>
  <rect width="800" height="450" fill="url(#dots-ag)"/>
  <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#cbd5e1">
    <text x="20" y="28">arduino-ground.demo</text>
    <text x="700" y="28" text-anchor="end">BridgeLab AI</text>
  </g>

  <!-- Arduino board -->
  <g>
    <rect x="80" y="140" width="240" height="160" rx="14" fill="url(#board-ag)" stroke="#22d3ee" stroke-opacity="0.4"/>
    <rect x="100" y="160" width="200" height="60" rx="6" fill="#0b3a52"/>
    <text x="200" y="196" text-anchor="middle" fill="#e0f2fe" font-family="ui-monospace" font-size="14" font-weight="600">ARDUINO UNO</text>
    <!-- pin headers -->
    <g fill="#0b1220">
      <rect x="100" y="232" width="200" height="14" rx="3"/>
      <rect x="100" y="252" width="200" height="14" rx="3"/>
    </g>
    <g fill="#fbbf24">
      <circle cx="120" cy="282" r="5"/>
      <circle cx="146" cy="282" r="5"/>
      <circle cx="172" cy="282" r="5"/>
      <circle cx="198" cy="282" r="5"/>
    </g>
    <text x="170" y="320" text-anchor="middle" fill="#fde68a" font-size="11">GND row</text>
  </g>

  <!-- External module -->
  <g>
    <rect x="500" y="180" width="220" height="140" rx="14" fill="#1e293b" stroke="#334155"/>
    <rect x="520" y="200" width="180" height="60" rx="6" fill="#0b1220"/>
    <text x="610" y="236" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace" font-size="13" font-weight="600">SENSOR MODULE</text>
    <g fill="#fbbf24">
      <circle cx="540" cy="290" r="5"/>
      <circle cx="566" cy="290" r="5"/>
      <circle cx="592" cy="290" r="5"/>
    </g>
    <text x="566" y="316" text-anchor="middle" fill="#fde68a" font-size="11">VCC / DATA / GND</text>
  </g>

  <!-- VCC + DATA wires -->
  <path d="M 200 282 C 280 360, 480 360, 540 290" stroke="#ef4444" stroke-width="3" fill="none"/>
  <path d="M 172 282 C 280 380, 470 380, 566 290" stroke="#22d3ee" stroke-width="3" fill="none"/>

  <!-- Missing GND link drawn as dashed warning -->
  <path d="M 146 282 C 220 410, 460 420, 592 290" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6 6" fill="none"/>
  <text x="370" y="425" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">No common ground between boards</text>
</svg>
