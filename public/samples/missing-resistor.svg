<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg-mr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <pattern id="dots-mr" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="rgba(148,163,184,0.18)"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg-mr)"/>
  <rect width="800" height="450" fill="url(#dots-mr)"/>
  <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#cbd5e1">
    <text x="20" y="28">missing-resistor.demo</text>
    <text x="700" y="28" text-anchor="end">BridgeLab AI</text>
  </g>

  <!-- Power rails -->
  <rect x="80" y="120" width="640" height="200" rx="18" fill="#0b1220" stroke="#1e293b"/>
  <line x1="100" y1="160" x2="700" y2="160" stroke="#dc2626" stroke-width="3"/>
  <line x1="100" y1="280" x2="700" y2="280" stroke="#94a3b8" stroke-width="3"/>
  <text x="120" y="153" fill="#fca5a5" font-size="11" font-weight="700">+5V</text>
  <text x="120" y="298" fill="#cbd5e1" font-size="11" font-weight="700">GND</text>

  <!-- LED directly between rails -->
  <g>
    <ellipse cx="400" cy="220" rx="26" ry="34" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <line x1="386" y1="252" x2="386" y2="280" stroke="#94a3b8" stroke-width="3"/>
    <line x1="414" y1="252" x2="414" y2="160" stroke="#dc2626" stroke-width="3"/>
    <text x="400" y="220" text-anchor="middle" fill="#dc2626" font-size="22" font-weight="700">!</text>
  </g>

  <!-- Heat marks -->
  <g fill="#fbbf24" opacity="0.9">
    <circle cx="362" cy="200" r="4"/>
    <circle cx="438" cy="200" r="4"/>
    <circle cx="350" cy="180" r="3"/>
    <circle cx="450" cy="180" r="3"/>
  </g>

  <text x="400" y="380" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">No resistor in series — LED current is unbounded</text>
</svg>
