<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg-rl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <pattern id="dots-rl" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="rgba(148,163,184,0.18)"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg-rl)"/>
  <rect width="800" height="450" fill="url(#dots-rl)"/>
  <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#cbd5e1">
    <text x="20" y="28">reversed-led.demo</text>
    <text x="700" y="28" text-anchor="end">BridgeLab AI</text>
  </g>

  <!-- Breadboard -->
  <rect x="80" y="120" width="640" height="220" rx="18" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <g stroke="#fde68a">
    <line x1="100" y1="160" x2="700" y2="160"/>
    <line x1="100" y1="180" x2="700" y2="180"/>
    <line x1="100" y1="280" x2="700" y2="280"/>
    <line x1="100" y1="300" x2="700" y2="300"/>
  </g>

  <!-- Power rails -->
  <text x="120" y="155" fill="#dc2626" font-size="11" font-weight="700">+5V</text>
  <text x="120" y="320" fill="#1e293b" font-size="11" font-weight="700">GND</text>

  <!-- Resistor -->
  <g>
    <rect x="240" y="200" width="120" height="22" rx="4" fill="#fde68a" stroke="#92400e"/>
    <rect x="252" y="200" width="6" height="22" fill="#92400e"/>
    <rect x="270" y="200" width="6" height="22" fill="#dc2626"/>
    <rect x="288" y="200" width="6" height="22" fill="#92400e"/>
    <text x="300" y="248" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">220Ω</text>
  </g>

  <!-- LED -->
  <g>
    <!-- LED bulb -->
    <ellipse cx="500" cy="210" rx="24" ry="30" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <!-- legs -->
    <line x1="490" y1="240" x2="490" y2="295" stroke="#94a3b8" stroke-width="3"/>
    <line x1="510" y1="240" x2="510" y2="295" stroke="#94a3b8" stroke-width="3"/>
    <!-- short leg should be cathode; here we visually swap to show reversed install -->
    <text x="490" y="320" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="700">+ (long)</text>
    <text x="510" y="335" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="700">− (short)</text>
  </g>

  <!-- Wires showing reversed orientation: + leg goes to GND rail, − leg goes through resistor to +5V -->
  <path d="M 490 295 L 490 305 L 200 305 L 200 320" stroke="#1e293b" stroke-width="3" fill="none"/>
  <path d="M 510 295 L 510 305 L 360 305 L 360 220" stroke="#dc2626" stroke-width="3" fill="none"/>
  <path d="M 240 211 L 200 211 L 200 160" stroke="#dc2626" stroke-width="3" fill="none"/>

  <text x="400" y="395" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">LED polarity is reversed: anode on ground side</text>
</svg>
