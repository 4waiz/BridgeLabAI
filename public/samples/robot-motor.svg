<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg-rm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <pattern id="dots-rm" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="rgba(148,163,184,0.18)"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg-rm)"/>
  <rect width="800" height="450" fill="url(#dots-rm)"/>
  <g font-family="ui-sans-serif, system-ui" font-size="11" fill="#cbd5e1">
    <text x="20" y="28">robot-motor.demo</text>
    <text x="700" y="28" text-anchor="end">BridgeLab AI</text>
  </g>

  <!-- L298N motor driver -->
  <g>
    <rect x="80" y="130" width="280" height="200" rx="14" fill="#16a34a" stroke="#4ade80" stroke-opacity="0.5"/>
    <rect x="100" y="150" width="240" height="70" rx="8" fill="#0f3a1d"/>
    <text x="220" y="194" text-anchor="middle" fill="#dcfce7" font-family="ui-monospace" font-size="14" font-weight="700">L298N MOTOR DRIVER</text>
    <g font-family="ui-monospace" font-size="11" fill="#dcfce7">
      <rect x="100" y="240" width="56" height="22" rx="4" fill="#0a2e15"/>
      <text x="128" y="256" text-anchor="middle">ENA</text>
      <rect x="166" y="240" width="56" height="22" rx="4" fill="#0a2e15"/>
      <text x="194" y="256" text-anchor="middle">IN1</text>
      <rect x="232" y="240" width="56" height="22" rx="4" fill="#0a2e15"/>
      <text x="260" y="256" text-anchor="middle">IN2</text>
    </g>
  </g>

  <!-- Arduino on the right -->
  <g>
    <rect x="500" y="120" width="220" height="220" rx="14" fill="#0e7490" stroke="#22d3ee" stroke-opacity="0.4"/>
    <text x="610" y="148" text-anchor="middle" fill="#e0f2fe" font-family="ui-monospace" font-size="13" font-weight="700">ARDUINO UNO</text>
    <g fill="#fbbf24">
      <circle cx="540" cy="200" r="5"/>
      <circle cx="540" cy="240" r="5"/>
      <circle cx="540" cy="280" r="5"/>
    </g>
    <text x="555" y="203" fill="#fde68a" font-size="11">D5 (PWM)</text>
    <text x="555" y="243" fill="#fde68a" font-size="11">D7</text>
    <text x="555" y="283" fill="#fde68a" font-size="11">D8</text>
  </g>

  <!-- Wires: swapped — ENA goes to D7 (no PWM), IN1 to D5, IN2 to D8 -->
  <path d="M 128 262 C 260 360, 440 360, 540 240" stroke="#fbbf24" stroke-width="3" fill="none"/>
  <path d="M 194 262 C 320 350, 460 240, 540 200" stroke="#22d3ee" stroke-width="3" fill="none"/>
  <path d="M 260 262 C 360 360, 470 320, 540 280" stroke="#a78bfa" stroke-width="3" fill="none"/>

  <text x="400" y="410" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">ENA on a non-PWM pin and IN1/IN2 swapped</text>
</svg>
